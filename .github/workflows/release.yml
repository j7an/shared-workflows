name: Publish Release

on:
  workflow_call:
    inputs:
      tag:
        type: string
        required: true
        description: "Semver tag to publish (e.g. v1.2.3)"

permissions:
  contents: write

concurrency:
  group: publish-release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish-release:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Update floating major and minor tags
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          [ -n "$TAG" ] || { echo "::error::tag input is empty - caller did not pass a tag"; exit 1; }
          REPO="${GITHUB_REPOSITORY}"

          # Parse semver components: v1.2.3 -> MAJOR=v1, MINOR=v1.2
          MAJOR=${TAG%%.*}
          MINOR=${TAG%.*}

          echo "Semver tag: $TAG (immutable)"
          echo "Minor tag:  $MINOR (floats to latest patch)"
          echo "Major tag:  $MAJOR (floats to latest minor+patch)"

          TAG_REF=$(gh api "repos/${REPO}/git/ref/tags/${TAG}")
          TAG_TYPE=$(printf '%s\n' "$TAG_REF" | jq -r '.object.type')
          TAG_SHA=$(printf '%s\n' "$TAG_REF" | jq -r '.object.sha')

          case "$TAG_TYPE" in
            commit)
              TARGET_SHA="$TAG_SHA"
              ;;
            tag)
              TAG_OBJECT=$(gh api "repos/${REPO}/git/tags/${TAG_SHA}")
              PEELED_TYPE=$(printf '%s\n' "$TAG_OBJECT" | jq -r '.object.type')
              if [ "$PEELED_TYPE" != "commit" ]; then
                echo "::error::Tag ${TAG} points at tag object ${TAG_SHA}, which points at ${PEELED_TYPE}; expected commit"
                exit 1
              fi
              TARGET_SHA=$(printf '%s\n' "$TAG_OBJECT" | jq -r '.object.sha')
              ;;
            *)
              echo "::error::Tag ${TAG} points at ${TAG_TYPE}; expected commit or tag object"
              exit 1
              ;;
          esac

          TARGET_VERIFIED=$(gh api "repos/${REPO}/git/commits/${TARGET_SHA}" --jq '.verification.verified')
          TARGET_REASON=$(gh api "repos/${REPO}/git/commits/${TARGET_SHA}" --jq '.verification.reason')

          update_floating_ref() {
            local ref_name="$1" target_sha="$2"
            local err_file patch_status
            err_file=$(mktemp)

            if gh api -X PATCH "repos/${REPO}/git/refs/tags/${ref_name}" \
              -f sha="$target_sha" \
              -F force=true >/dev/null 2>"$err_file"; then
              rm -f "$err_file"
              echo "Updated ${ref_name} -> ${target_sha}"
              return 0
            else
              patch_status=$?
            fi

            if gh api "repos/${REPO}/git/ref/tags/${ref_name}" >/dev/null 2>&1; then
              cat "$err_file" >&2
              rm -f "$err_file"
              echo "::error::Failed to move existing refs/tags/${ref_name}"
              return "$patch_status"
            fi

            rm -f "$err_file"
            gh api -X POST "repos/${REPO}/git/refs" \
              -f ref="refs/tags/${ref_name}" \
              -f sha="$target_sha"
            echo "Created ${ref_name} -> ${target_sha}"
          }

          update_floating_ref "$MINOR" "$TARGET_SHA"
          update_floating_ref "$MAJOR" "$TARGET_SHA"

          {
            echo "### Floating tags updated"
            echo ""
            echo "**Immutable tag:** \`$TAG\`"
            echo "**Target commit SHA:** \`$TARGET_SHA\`"
            echo "**Target commit verification:** \`verified=$TARGET_VERIFIED\` \`reason=$TARGET_REASON\`"
            echo "**Minor tag:** \`$MINOR\` -> \`$TARGET_SHA\`"
            echo "**Major tag:** \`$MAJOR\` -> \`$TARGET_SHA\`"
            echo ""
            echo "Floating tags were updated as lightweight refs. Target verification is reported for provenance and is not a gate in this workflow."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Idempotent: skip if a release already exists for this tag
          # (e.g. manual re-run, or backfilled during a migration).
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping"
            exit 0
          fi

          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag

          echo "Published release $TAG"
