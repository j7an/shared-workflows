name: Publish Release

on:
  workflow_call:
    inputs:
      tag:
        type: string
        required: true
        description: "Semver tag to publish (e.g. v1.2.3)"

permissions:
  contents: write

concurrency:
  group: publish-release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish-release:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Update floating major and minor tags
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          [ -n "$TAG" ] || { echo "::error::tag input is empty — caller did not pass a tag"; exit 1; }
          # Parse semver components: v1.2.3 → MAJOR=v1, MINOR=v1.2
          MAJOR=${TAG%%.*}
          MINOR=${TAG%.*}

          echo "Semver tag: $TAG (immutable)"
          echo "Minor tag:  $MINOR (floats to latest patch)"
          echo "Major tag:  $MAJOR (floats to latest minor+patch)"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Update minor floating tag (e.g., v1.2 → v1.2.3)
          git tag -fa "$MINOR" -m "Release $TAG"
          git push origin "$MINOR" --force
          echo "Updated $MINOR → $TAG"

          # Update major floating tag (e.g., v1 → v1.2.3)
          git tag -fa "$MAJOR" -m "Release $TAG"
          git push origin "$MAJOR" --force
          echo "Updated $MAJOR → $TAG"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Idempotent: skip if a release already exists for this tag
          # (e.g. manual re-run, or backfilled during a migration).
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping"
            exit 0
          fi

          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag

          echo "Published release $TAG"
