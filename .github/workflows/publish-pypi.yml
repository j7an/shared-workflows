name: Publish PyPI

on:
  workflow_call:
    inputs:
      tag:
        type: string
        required: true
        description: "Semver tag to publish (e.g. 'tools/v0.1.0' or 'v1.2.3')"
      package-dir:
        type: string
        required: false
        default: "."
        description: "Directory containing pyproject.toml (relative to repo root)"
      testpypi-package:
        type: string
        required: true
        description: "Distribution name on TestPyPI for install verification"
      verify-python:
        type: string
        required: false
        default: "3.13"
        description: "Python version used for TestPyPI install verification."
      draft-release:
        type: boolean
        required: false
        default: false
        description: "Create the GitHub release as a draft"
      attach-assets:
        type: boolean
        required: false
        default: true
        description: "Attach wheel + sdist to the GitHub release"

permissions:
  contents: read

concurrency:
  group: publish-pypi-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout at tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Verify tag is ancestor of main
        env:
          TAG: ${{ inputs.tag }}
        run: |
          TAG_SHA=$(git rev-list -n1 "$TAG")
          git fetch origin main
          if ! git merge-base --is-ancestor "$TAG_SHA" origin/main; then
            echo "::error::Tag ${TAG} (${TAG_SHA}) is not an ancestor of origin/main — refusing to publish"
            exit 1
          fi
          echo "Tag ${TAG} (${TAG_SHA}) is an ancestor of main — proceeding."

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Build wheel + sdist
        working-directory: ${{ inputs.package-dir }}
        run: |
          uv build
          ls dist/*.whl >/dev/null
          ls dist/*.tar.gz >/dev/null
          echo "Built artifacts:"
          ls -lh dist/

      - name: Upload dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pypi-dist
          path: ${{ inputs.package-dir }}/dist/
          if-no-files-found: error
          retention-days: 7

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write       # OIDC for trusted publishing
      attestations: write   # supply-chain provenance
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pypi-dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

      - name: Set up uv (for install verification venv)
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Verify install from TestPyPI
        env:
          TAG: ${{ inputs.tag }}
          TESTPYPI_PACKAGE: ${{ inputs.testpypi-package }}
          VERIFY_PYTHON: ${{ inputs.verify-python }}
        run: |
          # Parse semver from the tail of TAG, prefix-agnostic.
          # Matches normalized PEP 440 tag tails: 1.2.3, 1.2.3rc1, 1.2.3a1.
          VERSION=$(printf '%s' "$TAG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+([A-Za-z][A-Za-z0-9.]*)?$' || true)
          if [ -z "$VERSION" ]; then
            echo "::error::Could not parse semver version from tag '$TAG'"
            exit 1
          fi
          if ! printf '%s' "$VERIFY_PYTHON" | grep -qE '^[0-9]+(\.[0-9]+){1,2}$'; then
            echo "::error::verify-python must be a version like 3.13 or 3.13.2, got '$VERIFY_PYTHON'"
            exit 1
          fi
          if ! printf '%s' "$TESTPYPI_PACKAGE" | grep -qE '^[A-Za-z0-9][A-Za-z0-9._-]*$'; then
            echo "::error::testpypi-package contains characters that cannot be safely written to pyproject.toml: '$TESTPYPI_PACKAGE'"
            exit 1
          fi
          echo "Verifying TestPyPI install of ${TESTPYPI_PACKAGE}==${VERSION} with Python ${VERIFY_PYTHON}"

          SLEEPS="30 60 90 120 150"
          ATTEMPT=0
          for s in $SLEEPS; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt ${ATTEMPT}/5: sleeping ${s}s before install..."
            sleep "$s"
            rm -rf .verify
            mkdir -p .verify
            cat > .verify/pyproject.toml <<EOF
          [project]
          name = "testpypi-verify"
          version = "0.0.0"
          requires-python = ">=${VERIFY_PYTHON}"
          dependencies = [
            "${TESTPYPI_PACKAGE}==${VERSION}",
          ]

          [tool.uv.sources]
          "${TESTPYPI_PACKAGE}" = { index = "testpypi" }

          [[tool.uv.index]]
          name = "testpypi"
          url = "https://test.pypi.org/simple/"
          explicit = true
          EOF
            if (cd .verify && uv sync --python "$VERIFY_PYTHON" --refresh-package "$TESTPYPI_PACKAGE"); then
              echo "TestPyPI install verified for ${TESTPYPI_PACKAGE}==${VERSION} on attempt ${ATTEMPT}"
              exit 0
            fi
            echo "Attempt ${ATTEMPT} failed — will retry."
          done
          echo "::error::TestPyPI install verification failed after 5 attempts"
          exit 1

  publish-pypi:
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      attestations: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pypi-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/

  github-release:
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub release, upload assets
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout at tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Download dist artifact
        if: inputs.attach-assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pypi-dist
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          DRAFT_RELEASE: ${{ inputs.draft-release }}
          ATTACH_ASSETS: ${{ inputs.attach-assets }}
        run: |
          ARGS=( "$TAG" --generate-notes --title "$TAG" )
          # Classify from the normalized PEP 440 tail, not from the full tag.
          VERSION=$(printf '%s' "$TAG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+([A-Za-z][A-Za-z0-9.]*)?$' || true)
          if [ -z "$VERSION" ]; then
            echo "::error::Could not parse semver version from tag '$TAG'"
            exit 1
          fi
          if printf '%s\n' "$VERSION" | grep -Eq '(a|b|rc)[0-9]'; then
            ARGS+=( --prerelease )
          fi
          if [[ "$DRAFT_RELEASE" == "true" ]]; then
            ARGS+=( --draft )
          fi
          if [[ "$ATTACH_ASSETS" == "true" ]]; then
            ARGS+=( dist/*.whl dist/*.tar.gz )
          fi
          echo "Creating release: gh release create ${ARGS[*]}"
          gh release create "${ARGS[@]}"
