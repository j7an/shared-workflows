name: Dependency Cool-Down Gate

on:
  workflow_call:
    inputs:
      cooling_business_days:
        type: number
        default: 5
        description: "Business days before a bot PR passes the gate"
      bypass_label:
        type: string
        default: "security-bypass-cooling"
        description: "Label that skips the cooling period"
      create_tracking_issue:
        type: boolean
        default: true
        description: "Auto-create tracking issues for bot PRs"
      default_assignee:
        type: string
        default: ""
        description: "Issue assignee (empty = repo owner)"

jobs:
  set-pending-status:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Set cooldown status
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          ACTOR: ${{ github.actor }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BYPASS_LABEL: ${{ inputs.bypass_label }}
        run: |
          if [[ "$ACTOR" != "dependabot[bot]" ]]; then
            STATE="success"
            DESC="Non-bot PR — no cool-down required"
          else
            # Check for bypass label
            HAS_BYPASS=$(gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json labels \
              --jq "[.labels[]?.name] | any(. == \"$BYPASS_LABEL\")")
            if [[ "$HAS_BYPASS" == "true" ]]; then
              STATE="success"
              DESC="Cooling bypassed via $BYPASS_LABEL label"
            else
              STATE="pending"
              DESC="Security cool-down: merge allowed after ${{ inputs.cooling_business_days }} business days + exploit scan"
            fi
          fi
          gh api "repos/${REPOSITORY}/statuses/${HEAD_SHA}" \
            -f state="$STATE" \
            -f context="dependency-cooldown / gate" \
            -f description="$DESC"

  create-tracking-issue:
    if: >-
      inputs.create_tracking_issue &&
      github.event.action == 'opened' &&
      github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Create tracking issue and link to PR
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          REPO_OWNER: ${{ inputs.default_assignee != '' && inputs.default_assignee || github.repository_owner }}
          COOLING_DAYS: ${{ inputs.cooling_business_days }}
        run: |
          ISSUE_TITLE="Track: ${PR_TITLE}"

          # --- Parse package info from branch and title ---
          PKG_NAME=""
          OLD_VER=""
          NEW_VER=""
          ECOSYSTEM=""
          SECURITY_LINKS=""
          SCORECARD_BADGE=""

          OLD_VER=$(echo "$PR_TITLE" | sed -n 's/.*from \([^ ]*\) to .*/\1/p')
          NEW_VER=$(echo "$PR_TITLE" | sed -n 's/.* to \([^ ]*\).*/\1/p')

          # Helper: build GitHub Actions security links + badge
          build_actions_links() {
            SEC_ROW1="| GitHub Advisory (GHSA) | [Search advisories](https://github.com/advisories?query=ecosystem%3Aactions+${PKG_NAME}) |"
            SEC_ROW2="| OSV.dev | [Search vulnerabilities](https://osv.dev/list?ecosystem=GitHub+Actions&q=${PKG_NAME}) |"
            SEC_ROW4="| GitHub Releases | [View changelog](https://github.com/${PKG_NAME}/releases) |"

            # Only include Scorecard link + badge if the project has been scored
            SC_STATUS=$(curl -sf --max-time 10 -o /dev/null -w '%{http_code}' \
              "https://api.securityscorecards.dev/projects/github.com/${PKG_NAME}" 2>/dev/null || echo "000")
            if [ "$SC_STATUS" = "200" ]; then
              SEC_ROW3="| OpenSSF Scorecard | [View project health](https://scorecard.dev/viewer/?uri=github.com/${PKG_NAME}) |"
              SECURITY_LINKS="$(printf '%s\n%s\n%s\n%s' "$SEC_ROW1" "$SEC_ROW2" "$SEC_ROW3" "$SEC_ROW4")"
              SCORECARD_BADGE="$(printf '[![OpenSSF Scorecard](https://api.securityscorecards.dev/projects/github.com/%s/badge)](https://scorecard.dev/viewer/?uri=github.com/%s)' "$PKG_NAME" "$PKG_NAME")"
            else
              SECURITY_LINKS="$(printf '%s\n%s\n%s' "$SEC_ROW1" "$SEC_ROW2" "$SEC_ROW4")"
              SCORECARD_BADGE=""
            fi
          }

          # Helper: build PyPI security links for a single package
          build_pypi_links() {
            SEC_ROW1="| GitHub Advisory (GHSA) | [Search advisories](https://github.com/advisories?query=ecosystem%3Apip+${PKG_NAME}) |"
            SEC_ROW2="| OSV.dev | [Search vulnerabilities](https://osv.dev/list?ecosystem=PyPI&q=${PKG_NAME}) |"
            SEC_ROW3="| PyPI | [View package](https://pypi.org/project/${PKG_NAME}/) |"
            SECURITY_LINKS="$(printf '%s\n%s\n%s' "$SEC_ROW1" "$SEC_ROW2" "$SEC_ROW3")"
          }

          # Helper: build PyPI security links for multiple packages (grouped PRs)
          build_pypi_group_links() {
            SECURITY_LINKS=""
            for PKG in $GROUP_PKGS; do
              SEC_ROW1="| GitHub Advisory (GHSA) | [Search \`${PKG}\`](https://github.com/advisories?query=ecosystem%3Apip+${PKG}) |"
              SEC_ROW2="| OSV.dev | [Search \`${PKG}\`](https://osv.dev/list?ecosystem=PyPI&q=${PKG}) |"
              SEC_ROW3="| PyPI | [\`${PKG}\`](https://pypi.org/project/${PKG}/) |"
              SECURITY_LINKS+="$(printf '%s\n%s\n%s\n' "$SEC_ROW1" "$SEC_ROW2" "$SEC_ROW3")"
            done
          }

          case "$PR_BRANCH" in
            dependabot/github_actions/*)
              ECOSYSTEM="GitHub Actions"
              PKG_NAME=$(echo "$PR_BRANCH" | sed 's|dependabot/github_actions/||' | sed 's|-[0-9].*||')
              build_actions_links
              ;;
            dependabot/pip/*|dependabot/uv/*)
              ECOSYSTEM="PyPI"
              # Check if this is a grouped PR (branch contains group name, not package)
              PR_BODY=$(gh pr view "$PR_NUMBER" --repo "$GH_REPO" --json body --jq '.body')
              GROUP_PKGS=$(echo "$PR_BODY" | sed -n 's/.*Updates `\([^`]*\)` from .*/\1/p' | tr '\n' ' ')
              if [ -n "$GROUP_PKGS" ] && [ "$(echo "$GROUP_PKGS" | wc -w | tr -d ' ')" -gt 1 ]; then
                # Grouped PR — multiple packages
                PKG_NAME=$(echo "$GROUP_PKGS" | sed 's/ /, /g' | sed 's/, $//')
                build_pypi_group_links
              else
                # Single package PR
                PKG_NAME=$(echo "$PR_BRANCH" | sed -E 's|dependabot/(pip\|uv)/||' | sed 's|-[0-9].*||')
                build_pypi_links
              fi
              ;;
            *)
              ECOSYSTEM="Unknown"
              PKG_NAME="$PR_TITLE"
              ;;
          esac

          # --- Compute cooldown eligible date ---
          ELIGIBLE_DATE=$(COOLING_DAYS="$COOLING_DAYS" python3 -c "
          from datetime import datetime, timedelta, timezone
          import os
          now = datetime.now(timezone.utc)
          threshold = int(os.environ['COOLING_DAYS'])
          count = 0
          current = now
          while count < threshold:
              current += timedelta(days=1)
              if current.weekday() < 5:
                  count += 1
          print(current.strftime('%Y-%m-%d'))
          ")

          # --- Check for existing tracking issue (dedup) ---
          EXISTING=$(gh issue list --repo "$GH_REPO" --state open \
            --search "in:title \"${ISSUE_TITLE}\"" \
            --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Tracking issue #${EXISTING} already exists — skipping creation"
            CURRENT_BODY=$(gh pr view "$PR_NUMBER" --repo "$GH_REPO" --json body --jq '.body')
            if ! echo "$CURRENT_BODY" | grep -q "Fixes #${EXISTING}"; then
              NEW_BODY="$(printf 'Fixes #%s \u2014 Tracking issue (cooldown expires %s)\n\n%s' "$EXISTING" "$ELIGIBLE_DATE" "$CURRENT_BODY")"
              gh pr edit "$PR_NUMBER" --repo "$GH_REPO" --body "$NEW_BODY"
            fi
            exit 0
          fi

          # --- Detect ecosystem labels ---
          LABELS="dependencies"
          case "$PR_BRANCH" in
            dependabot/github_actions/*) LABELS="dependencies,github_actions" ;;
            dependabot/pip/*|dependabot/uv/*) LABELS="dependencies,python" ;;
          esac

          # --- Build enriched issue body ---
          ISSUE_BODY="## Dependency Update Tracking"
          ISSUE_BODY+="$(printf '\n\n**PR:** #%s' "$PR_NUMBER")"
          ISSUE_BODY+="$(printf '\n**Package:** \x60%s\x60' "$PKG_NAME")"

          if [ -n "$OLD_VER" ] && [ -n "$NEW_VER" ]; then
            ISSUE_BODY+="$(printf '\n**Update:** %s \u2192 %s' "$OLD_VER" "$NEW_VER")"
          fi

          ISSUE_BODY+="$(printf '\n**Ecosystem:** %s' "$ECOSYSTEM")"
          ISSUE_BODY+="$(printf '\n**Eligible for merge:** %s (after %s business days)' "$ELIGIBLE_DATE" "$COOLING_DAYS")"

          if [ -n "$SCORECARD_BADGE" ]; then
            ISSUE_BODY+="$(printf '\n\n%s' "$SCORECARD_BADGE")"
          fi

          if [ -n "$SECURITY_LINKS" ]; then
            SEC_HDR="| Source | Link |"
            SEC_SEP="|--------|------|"
            SEC_TABLE="$(printf '%s\n%s\n%s' "$SEC_HDR" "$SEC_SEP" "$SECURITY_LINKS")"
            ISSUE_BODY+="$(printf '\n\n### Security Links\n\nMonitor these sources for advisories before the cooldown expires:\n\n%s' "$SEC_TABLE")"
          fi

          ISSUE_BODY+="$(printf '\n\n> This issue was auto-generated and will close when the PR is merged.')"

          # --- Create tracking issue ---
          ISSUE_URL=$(gh issue create \
            --repo "$GH_REPO" \
            --title "$ISSUE_TITLE" \
            --body "$ISSUE_BODY" \
            --label "$LABELS" \
            --assignee "$REPO_OWNER")
          ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
          echo "Created tracking issue #${ISSUE_NUMBER}"

          # --- Prepend enriched Fixes reference to PR body ---
          CURRENT_BODY=$(gh pr view "$PR_NUMBER" --repo "$GH_REPO" --json body --jq '.body')
          if ! echo "$CURRENT_BODY" | grep -q "Fixes #${ISSUE_NUMBER}"; then
            NEW_BODY="$(printf 'Fixes #%s \u2014 Tracking issue (cooldown expires %s)\n\n%s' "$ISSUE_NUMBER" "$ELIGIBLE_DATE" "$CURRENT_BODY")"
            gh pr edit "$PR_NUMBER" --repo "$GH_REPO" --body "$NEW_BODY"
            echo "Added Fixes #${ISSUE_NUMBER} to PR body"
          fi
