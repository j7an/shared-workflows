name: Dependency Cool-Down Scan

on:
  workflow_call:
    inputs:
      cooling_business_days:
        type: number
        default: 5
        description: "Business days before a bot PR is eligible for scanning"
      bypass_label:
        type: string
        default: "security-bypass-cooling"
        description: "Label that skips the cooling period"
      enable_scorecard:
        type: boolean
        default: true
        description: "Include OpenSSF Scorecard in scan results"
      auto_merge:
        type: boolean
        default: false
        description: "Auto-merge clean PRs after scan completes"

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Find mature bot PRs
        id: find-prs
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          COOLING_DAYS: ${{ inputs.cooling_business_days }}
        run: |
          # Get all open bot PRs with metadata
          PR_DATA=$(gh pr list \
            --repo "$GH_REPO" \
            --state open \
            --json number,author,createdAt \
            --jq "[
              .[] |
              select(
                .author.login == \"dependabot[bot]\"
              ) |
              {number, createdAt}
            ]")

          # Filter by business days (Mon-Fri only) using Python.
          # Pass PR_DATA via env, NOT stdin: `echo ... | python3 <<EOF` collides
          # on stdin — the heredoc wins as the script source and the piped data
          # is silently discarded, so json.load(sys.stdin) previously saw empty
          # input and crashed every scheduled run with JSONDecodeError.
          PR_NUMBERS=$(PR_DATA="$PR_DATA" python3 <<'PYEOF'
          import json, os
          from datetime import datetime, timedelta

          def business_days_elapsed(created_at):
              created = datetime.fromisoformat(created_at.replace("Z", "+00:00"))
              now = datetime.now(created.tzinfo)
              count = 0
              current = created
              while True:
                  current += timedelta(days=1)
                  if current > now:
                      break
                  if current.weekday() < 5:
                      count += 1
              return count

          threshold = int(os.environ["COOLING_DAYS"])
          prs = json.loads(os.environ["PR_DATA"])
          for pr in prs:
              if business_days_elapsed(pr["createdAt"]) >= threshold:
                  print(pr["number"])
          PYEOF
          )

          if [ -z "$PR_NUMBERS" ]; then
            echo "No PRs ready for scanning"
            echo "pr_numbers=" >> "$GITHUB_OUTPUT"
          else
            echo "Found PRs: $PR_NUMBERS"
            echo "pr_numbers<<EOF" >> "$GITHUB_OUTPUT"
            echo "$PR_NUMBERS" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Scan and comment
        if: steps.find-prs.outputs.pr_numbers != ''
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBERS: ${{ steps.find-prs.outputs.pr_numbers }}
          BYPASS_LABEL: ${{ inputs.bypass_label }}
          ENABLE_SCORECARD: ${{ inputs.enable_scorecard }}
          AUTO_MERGE: ${{ inputs.auto_merge }}
        run: |
          declare -A ACTION_VERSIONS PY_VERSIONS
          for PR_NUMBER in $PR_NUMBERS; do
            echo "=== Scanning PR #${PR_NUMBER} ==="

            # Get PR metadata including labels for bypass check
            PR_META=$(gh pr view "$PR_NUMBER" \
              --repo "$GH_REPO" \
              --json createdAt,headRefOid,labels,body)
            CREATED_AT=$(echo "$PR_META" | jq -r '.createdAt')
            HEAD_SHA=$(echo "$PR_META" | jq -r '.headRefOid')
            PR_BODY=$(echo "$PR_META" | jq -r '.body // ""')

            # Check for bypass label
            HAS_BYPASS=$(echo "$PR_META" | jq -r \
              --arg label "$BYPASS_LABEL" \
              '[.labels[]?.name] | any(. == $label)')
            if [[ "$HAS_BYPASS" == "true" ]]; then
              gh api "repos/${GH_REPO}/statuses/${HEAD_SHA}" \
                -f state=success \
                -f context="dependency-cooldown / gate" \
                -f description="Cooling bypassed via ${BYPASS_LABEL} label"
              echo "PR #${PR_NUMBER} has bypass label — skipping scan"
              continue
            fi

            # Calculate PR age
            CREATED_TS=$(date -d "$CREATED_AT" +%s 2>/dev/null \
                         || date -jf "%Y-%m-%dT%H:%M:%SZ" "$CREATED_AT" +%s)
            NOW_TS=$(date +%s)
            AGE_SECONDS=$((NOW_TS - CREATED_TS))
            AGE_DAYS=$((AGE_SECONDS / 86400))
            AGE_HOURS=$(( (AGE_SECONDS % 86400) / 3600 ))

            # Calculate business days for display
            BIZ_DAYS=$(CREATED_AT="$CREATED_AT" python3 -c "
            import os
            from datetime import datetime, timedelta
            created = datetime.fromisoformat(os.environ['CREATED_AT'].replace('Z', '+00:00'))
            now = datetime.now(created.tzinfo)
            count = 0
            current = created
            while True:
                current += timedelta(days=1)
                if current > now:
                    break
                if current.weekday() < 5:
                    count += 1
            print(count)
            ")

            # Extract dependencies from PR diff
            DIFF=$(gh pr diff "$PR_NUMBER" --repo "$GH_REPO")

            DEPS=""
            SCAN_RESULTS=""
            GHSA_TOTAL=0
            OSV_TOTAL=0
            HAS_ERROR=""
            ACTION_VERSIONS=()
            PY_VERSIONS=()
            FILTERED_RESULTS=""
            FILTERED_TOTAL=0

            # --- Parse GitHub Actions dependencies ---
            ACTIONS=$(echo "$DIFF" | grep -E '^\+\s+uses:' | \
              sed -E 's/^\+\s+uses:\s+//' | \
              sed -E 's/@.*//' | \
              sed -E 's/\s*#.*//' | \
              grep -v -E '^(\.\/|docker://)' | \
              sort -u || true)

            for ACTION in $ACTIONS; do
              [ -z "$ACTION" ] && continue
              DEPS="${DEPS}\`${ACTION}\`, "

              # Query GHSA via GraphQL
              GHSA_RESULT=$(gh api graphql -f query='
                query($name: String!) {
                  securityVulnerabilities(
                    ecosystem: ACTIONS
                    package: $name
                    first: 10
                  ) {
                    nodes {
                      advisory {
                        ghsaId
                        severity
                        summary
                      }
                    }
                  }
                }
              ' -f "name=${ACTION}" 2>&1) || {
                HAS_ERROR="true"
                SCAN_RESULTS="${SCAN_RESULTS}| (GHSA query failed for \`${ACTION}\`) | - | - | GHSA |"$'\n'
                GHSA_RESULT=""
              }

              # Check for GraphQL-level errors (gh exits 0 on HTTP 200 even with errors)
              if [ -n "$GHSA_RESULT" ] && echo "$GHSA_RESULT" | jq -e '.errors' > /dev/null 2>&1; then
                HAS_ERROR="true"
                GHSA_ERR=$(echo "$GHSA_RESULT" | jq -r '.errors[0].message // "unknown error"')
                SCAN_RESULTS="${SCAN_RESULTS}| (GHSA error for \`${ACTION}\`: ${GHSA_ERR}) | - | - | GHSA |"$'\n'
                GHSA_RESULT=""
              fi

              if [ -n "$GHSA_RESULT" ]; then
                GHSA_VULNS=$(echo "$GHSA_RESULT" | jq -r '
                  .data.securityVulnerabilities.nodes[] |
                  "| \(.advisory.ghsaId) | \(.advisory.severity) | \(.advisory.summary) | GHSA |"
                ' 2>/dev/null || true)

                if [ -n "$GHSA_VULNS" ]; then
                  GHSA_COUNT=$(echo "$GHSA_VULNS" | wc -l | tr -d ' ')
                  GHSA_TOTAL=$((GHSA_TOTAL + GHSA_COUNT))
                  SCAN_RESULTS="${SCAN_RESULTS}${GHSA_VULNS}"$'\n'
                fi
              fi

              # Query OSV
              OSV_BODY=$(jq -n --arg name "$ACTION" --arg eco "GitHub Actions" \
                '{"package":{"name":$name,"ecosystem":$eco}}')
              OSV_RESULT=$(curl -sf --max-time 30 \
                -X POST "https://api.osv.dev/v1/query" \
                -H "Content-Type: application/json" \
                -d "$OSV_BODY" \
                2>&1) || {
                HAS_ERROR="true"
                SCAN_RESULTS="${SCAN_RESULTS}| (OSV query failed for \`${ACTION}\`) | - | - | OSV |"$'\n'
                OSV_RESULT=""
              }

              if [ -n "$OSV_RESULT" ]; then
                OSV_VULNS=$(echo "$OSV_RESULT" | jq -r '
                  .vulns[]? |
                  "| \(.id) | \(.database_specific.severity // "UNKNOWN") | \(.summary // .details[:80]) | OSV |"
                ' 2>/dev/null || true)

                if [ -n "$OSV_VULNS" ]; then
                  OSV_COUNT=$(echo "$OSV_VULNS" | wc -l | tr -d ' ')
                  OSV_TOTAL=$((OSV_TOTAL + OSV_COUNT))
                  SCAN_RESULTS="${SCAN_RESULTS}${OSV_VULNS}"$'\n'
                fi
              fi
            done

            # --- Parse Python dependencies ---
            PY_DEPS=$(echo "$DIFF" | grep -E '^\+.*=' | \
              grep -v '^\+\+\+' | \
              grep -v '^\+#' | \
              grep -v 'uses:' | \
              sed -E 's/^\+\s*//' | \
              grep -E '^[a-zA-Z].*[>=<~!]' | \
              sed -E 's/[>=<~!].*//' | \
              sed -E 's/\s*$//' | \
              sort -u || true)

            for PKG in $PY_DEPS; do
              [ -z "$PKG" ] && continue
              DEPS="${DEPS}\`${PKG}\`, "

              # Query GHSA for PyPI
              GHSA_RESULT=$(gh api graphql -f query='
                query($name: String!) {
                  securityVulnerabilities(
                    ecosystem: PIP
                    package: $name
                    first: 10
                  ) {
                    nodes {
                      advisory {
                        ghsaId
                        severity
                        summary
                      }
                    }
                  }
                }
              ' -f "name=${PKG}" 2>&1) || {
                HAS_ERROR="true"
                SCAN_RESULTS="${SCAN_RESULTS}| (GHSA query failed for \`${PKG}\`) | - | - | GHSA |"$'\n'
                GHSA_RESULT=""
              }

              # Check for GraphQL-level errors
              if [ -n "$GHSA_RESULT" ] && echo "$GHSA_RESULT" | jq -e '.errors' > /dev/null 2>&1; then
                HAS_ERROR="true"
                GHSA_ERR=$(echo "$GHSA_RESULT" | jq -r '.errors[0].message // "unknown error"')
                SCAN_RESULTS="${SCAN_RESULTS}| (GHSA error for \`${PKG}\`: ${GHSA_ERR}) | - | - | GHSA |"$'\n'
                GHSA_RESULT=""
              fi

              if [ -n "$GHSA_RESULT" ]; then
                GHSA_VULNS=$(echo "$GHSA_RESULT" | jq -r '
                  .data.securityVulnerabilities.nodes[] |
                  "| \(.advisory.ghsaId) | \(.advisory.severity) | \(.advisory.summary) | GHSA |"
                ' 2>/dev/null || true)

                if [ -n "$GHSA_VULNS" ]; then
                  GHSA_COUNT=$(echo "$GHSA_VULNS" | wc -l | tr -d ' ')
                  GHSA_TOTAL=$((GHSA_TOTAL + GHSA_COUNT))
                  SCAN_RESULTS="${SCAN_RESULTS}${GHSA_VULNS}"$'\n'
                fi
              fi

              # Query OSV for PyPI
              OSV_BODY=$(jq -n --arg name "$PKG" --arg eco "PyPI" \
                '{"package":{"name":$name,"ecosystem":$eco}}')
              OSV_RESULT=$(curl -sf --max-time 30 \
                -X POST "https://api.osv.dev/v1/query" \
                -H "Content-Type: application/json" \
                -d "$OSV_BODY" \
                2>&1) || {
                HAS_ERROR="true"
                SCAN_RESULTS="${SCAN_RESULTS}| (OSV query failed for \`${PKG}\`) | - | - | OSV |"$'\n'
                OSV_RESULT=""
              }

              if [ -n "$OSV_RESULT" ]; then
                OSV_VULNS=$(echo "$OSV_RESULT" | jq -r '
                  .vulns[]? |
                  "| \(.id) | \(.database_specific.severity // "UNKNOWN") | \(.summary // .details[:80]) | OSV |"
                ' 2>/dev/null || true)

                if [ -n "$OSV_VULNS" ]; then
                  OSV_COUNT=$(echo "$OSV_VULNS" | wc -l | tr -d ' ')
                  OSV_TOTAL=$((OSV_TOTAL + OSV_COUNT))
                  SCAN_RESULTS="${SCAN_RESULTS}${OSV_VULNS}"$'\n'
                fi
              fi
            done

            # --- OpenSSF Scorecard (Tier 2, GitHub Actions only) ---
            SCORECARD_TABLE=""
            if [[ "$ENABLE_SCORECARD" == "true" ]]; then
              for ACTION in $ACTIONS; do
                [ -z "$ACTION" ] && continue
                SC_RESULT=$(curl -sf --max-time 30 \
                  "https://api.securityscorecards.dev/projects/github.com/${ACTION}" \
                  2>/dev/null) || SC_RESULT=""

                if [ -z "$SC_RESULT" ]; then
                  SCORECARD_TABLE="${SCORECARD_TABLE}| \`${ACTION}\` | Not available | - |"$'\n'
                else
                  SC_SCORE=$(echo "$SC_RESULT" | jq -r '.score // "N/A"')
                  SC_URL="https://scorecard.dev/viewer/?uri=github.com/${ACTION}"
                  SCORECARD_TABLE="${SCORECARD_TABLE}| \`${ACTION}\` | ${SC_SCORE}/10 | [View](${SC_URL}) |"$'\n'
                fi
              done
            fi

            SCORECARD_SECTION=""
            if [ -n "$SCORECARD_TABLE" ]; then
              SC_HDR="| Action | Score | Details |"
              SC_SEP="|--------|-------|---------|"
              SCORECARD_SECTION="$(printf '\n### Project Health (OpenSSF Scorecard)\n\n%s\n%s\n%s' \
                "$SC_HDR" "$SC_SEP" "$SCORECARD_TABLE")"
            fi

            # Strip trailing comma-space from DEPS
            DEPS=$(echo "$DEPS" | sed 's/, $//')

            # Default if no deps found
            if [ -z "$DEPS" ]; then
              DEPS="(no dependencies extracted from diff)"
            fi

            # Build comment — table headers/separators stored in variables
            # to avoid bare | at column 0 which breaks YAML block scalar parsing
            TOTAL=$((GHSA_TOTAL + OSV_TOTAL))
            if [ "$TOTAL" -gt 0 ]; then
              RESULTS_HEADER="**${TOTAL} advisory/ies found** — review before merging."
              TABLE_HDR="| ID | Severity | Summary | Source |"
              TABLE_SEP="|----|----------|---------|--------|"
              RESULTS_TABLE="$(printf '%s\n%s\n%s' "$TABLE_HDR" "$TABLE_SEP" "$SCAN_RESULTS")"
              RESULTS_FOOTER="> Review the advisories above before deciding to merge."
            elif [ -n "$HAS_ERROR" ]; then
              # Do NOT post comment or update status on errors.
              # This allows the next scheduled run to retry the scan.
              echo "Scan had API errors for PR #${PR_NUMBER} — skipping comment and status. Will retry next cycle."
              continue
            else
              RESULTS_HEADER="No known exploits found in GHSA or OSV databases."
              TABLE_HDR="| Source | Vulnerabilities |"
              TABLE_SEP="|--------|----------------|"
              ROW1="| GitHub Advisory (GHSA) | 0 found |"
              ROW2="| OSV.dev | 0 found |"
              RESULTS_TABLE="$(printf '%s\n%s\n%s\n%s' "$TABLE_HDR" "$TABLE_SEP" "$ROW1" "$ROW2")"
              if [[ "$AUTO_MERGE" == "true" ]]; then
                RESULTS_FOOTER="> Auto-merge has been enabled. This PR will merge once all status checks pass."
              else
                RESULTS_FOOTER="> This PR is now eligible for manual review and merge."
              fi
            fi

            COMMENT_BODY="$(printf '%s\n\n%s\n%s\n\n%s\n\n%s\n\n%s\n\n%s%s' \
              "## Dependency Security Scan (Cool-Down Complete)" \
              "**PR age:** ${AGE_DAYS} days, ${AGE_HOURS} hours (${BIZ_DAYS} business days)" \
              "**Packages scanned:** ${DEPS}" \
              "### Results" \
              "$RESULTS_HEADER" \
              "$RESULTS_TABLE" \
              "$RESULTS_FOOTER" \
              "$SCORECARD_SECTION")"

            # --- Comment management: update-or-create with change detection ---

            # Search for existing scan comment (HTML marker or legacy heading)
            COMMENTS_JSON=$(gh api "repos/${GH_REPO}/issues/${PR_NUMBER}/comments" --paginate)
            EXISTING_COMMENT_ID=$(echo "$COMMENTS_JSON" | jq -r "
              [.[] | select(
                (.body | contains(\"<!-- dependency-scan-\")) or
                (.body | contains(\"## Dependency Security Scan\"))
              )][0].id // empty")

            # Extract previous advisory IDs for change detection
            PREV_IDS=""
            if [ -n "$EXISTING_COMMENT_ID" ]; then
              PREV_BODY=$(echo "$COMMENTS_JSON" | jq -r "
                [.[] | select(.id == ${EXISTING_COMMENT_ID})][0].body")
              PREV_IDS=$(echo "$PREV_BODY" | \
                grep -oE '(GHSA-[a-z0-9]{4}-[a-z0-9]{4}-[a-z0-9]{4}|PYSEC-[0-9]+-[0-9]+)' | \
                sort -u | tr '\n' ',' | sed 's/,$//' || true)
            fi

            # Collect current advisory IDs
            CURRENT_IDS=$(echo "$SCAN_RESULTS" | \
              grep -oE '(GHSA-[a-z0-9]{4}-[a-z0-9]{4}-[a-z0-9]{4}|PYSEC-[0-9]+-[0-9]+)' | \
              sort -u | tr '\n' ',' | sed 's/,$//' || true)

            # Add HTML marker and timestamp to comment body
            SCAN_MARKER="<!-- dependency-scan-${PR_NUMBER} -->"
            TIMESTAMP="Last scanned: $(date -u +'%Y-%m-%d %H:%M') UTC"
            DIVIDER="---"
            COMMENT_BODY="$(printf '%s\n%s\n\n%s\n_%s_' \
              "$SCAN_MARKER" \
              "$COMMENT_BODY" \
              "$DIVIDER" \
              "$TIMESTAMP")"

            # Update existing comment or create new one
            if [ -n "$EXISTING_COMMENT_ID" ]; then
              gh api "repos/${GH_REPO}/issues/comments/${EXISTING_COMMENT_ID}" \
                -X PATCH \
                -f body="$COMMENT_BODY"
              echo "Updated existing scan comment (ID: ${EXISTING_COMMENT_ID})"
            else
              gh pr comment "$PR_NUMBER" \
                --repo "$GH_REPO" \
                --body "$COMMENT_BODY"
              echo "Created new scan comment"
            fi

            # Post change notification if advisory status changed
            if [ -n "$EXISTING_COMMENT_ID" ] && [ "$PREV_IDS" != "$CURRENT_IDS" ]; then
              CHANGE_NOTE="Advisory status changed since last scan — review updated findings above."
              gh pr comment "$PR_NUMBER" \
                --repo "$GH_REPO" \
                --body "$CHANGE_NOTE"
              echo "Posted change notification"
            fi

            # --- Auto-merge decision (opt-in via auto_merge input) ---
            if [[ "$AUTO_MERGE" == "true" ]]; then
              if [ "$TOTAL" -eq 0 ]; then
                if gh pr merge --auto --squash "$PR_NUMBER" --repo "$GH_REPO"; then
                  STATUS_DESC="Cool-down complete. Clean scan. Auto-merge enabled."
                  echo "Auto-merge enabled for PR #${PR_NUMBER} (clean scan)"
                else
                  STATUS_DESC="Cool-down complete. Clean scan. Auto-merge unavailable — merge manually."
                  echo "WARNING: gh pr merge failed for PR #${PR_NUMBER} — manual merge required"
                fi
              else
                gh label create "security-review-needed" \
                  --repo "$GH_REPO" \
                  --color "B60205" \
                  --description "Dependency scan found advisories — manual review required" \
                  --force
                gh pr edit "$PR_NUMBER" --repo "$GH_REPO" \
                  --add-label "security-review-needed"
                STATUS_DESC="Cool-down complete. Advisories found. Manual review required."
                echo "Skipped auto-merge for PR #${PR_NUMBER}: ${TOTAL} advisory/ies found, labeled security-review-needed"
              fi
            else
              STATUS_DESC="Cool-down complete. Exploit scan posted. Ready for manual review."
            fi

            # Set status to success
            gh api "repos/${GH_REPO}/statuses/${HEAD_SHA}" \
              -f state=success \
              -f context="dependency-cooldown / gate" \
              -f description="$STATUS_DESC"

            echo "=== Done with PR #${PR_NUMBER} ==="
          done
