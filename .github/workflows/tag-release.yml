name: Tag Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump (auto = infer from conventional commits since last tag)"
        type: choice
        required: true
        default: auto
        options:
          - auto
          - patch
          - minor
          - major
      tag-prefix:
        description: "Tag prefix (e.g. 'v' for v1.2.3, 'tools/v' for tools/v1.2.3)"
        type: string
        required: false
        default: "v"
  workflow_call:
    inputs:
      bump:
        type: string
        required: false
        default: auto
        description: "Semver bump (auto/patch/minor/major)"
      tag-prefix:
        type: string
        required: false
        default: "v"
        description: "Tag prefix (e.g. 'v' for v1.2.3, 'tools/v' for tools/v1.2.3)"
    secrets:
      RELEASE_BOT_PRIVATE_KEY:
        required: true
    outputs:
      tag:
        description: "The semver tag that was created (e.g. v1.2.3)"
        value: ${{ jobs.tag-release.outputs.tag }}

permissions:
  contents: write

concurrency:
  group: tag-release
  cancel-in-progress: false

jobs:
  tag-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.compute.outputs.next_tag }}
    # Gate secret access on a named environment so a malicious workflow edit
    # can't reach RELEASE_BOT_PRIVATE_KEY without passing the environment's
    # branch-policy check (main only). Pairs with the if: below as a
    # GitHub-side enforcement of the same invariant.
    environment: release
    # Releases must originate from main's latest commit. workflow_dispatch
    # lets the operator pick any branch in the Actions UI, so we gate
    # explicitly instead of relying on trust.
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Preflight — verify Release Bot App credentials
        env:
          APP_ID: ${{ vars.RELEASE_BOT_APP_ID }}
        run: |
          if [ -z "${APP_ID}" ]; then
            {
              echo "### Release Bot App not configured"
              echo ""
              echo "\`vars.RELEASE_BOT_APP_ID\` is empty. Tag Release needs a GitHub App identity"
              echo "to push tags so that \`release.yml\` fires (the default \`GITHUB_TOKEN\` is"
              echo "suppressed by GitHub's recursion guard)."
              echo ""
              echo "See [README › Release Bot App setup](../../README.md#release-bot-app-setup)"
              echo "for one-time provisioning steps."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Release Bot App not configured (see README#release-bot-app-setup)"
            exit 1
          fi
          echo "Release Bot App ID present: ${APP_ID}"

      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ vars.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ steps.app-token.outputs.token }}

      - name: Compute release
        id: compute
        env:
          CHOICE: ${{ inputs.bump }}
          TAG_PREFIX: ${{ inputs.tag-prefix }}
        run: |
          PREFIX="${TAG_PREFIX:-v}"

          # Reject prefixes containing characters that would break `git tag -l`
          # globbing or shell expansion. Allow alnum, '/', '-', '_', '.'.
          if ! printf '%s' "$PREFIX" | grep -qE '^[A-Za-z0-9._/-]+$'; then
            echo "::error::Invalid tag-prefix '$PREFIX' (must match [A-Za-z0-9._/-]+)"
            exit 1
          fi

          # --- Find previous tag ---
          LATEST=$(git tag -l "${PREFIX}*.*.*" --sort=-version:refname | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="${PREFIX}0.0.0"
            FIRST_RELEASE="true"
            echo "No existing semver tags — bootstrapping from ${LATEST}"
          else
            FIRST_RELEASE="false"
            echo "Latest tag: $LATEST"
          fi

          # --- Collect commits since LATEST ---
          if [ "$FIRST_RELEASE" = "true" ]; then
            RANGE="HEAD"
          else
            RANGE="${LATEST}..HEAD"
          fi

          # Subjects only (for display in the step summary)
          SUBJECTS=$(git log --format='%s' "$RANGE")
          # Full messages (subject + body) for BREAKING CHANGE detection
          FULL=$(git log --format='%s%n%b%n---COMMIT---' "$RANGE")

          COMMIT_COUNT=$(printf '%s\n' "$SUBJECTS" | grep -c . || true)
          echo "Commits since $LATEST: $COMMIT_COUNT"

          if [ "$COMMIT_COUNT" -eq 0 ]; then
            {
              echo "### Release blocked: no commits since $LATEST"
              echo ""
              echo "Refusing to create an empty release. Merge some PRs and try again."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::No commits since $LATEST, refusing to create empty release"
            exit 1
          fi

          # --- Analyze commits for bump level ---
          ANALYSIS_BUMP="patch"
          ANALYSIS_REASON="no feat or breaking-change markers found"

          if printf '%s\n' "$FULL" | grep -qE '^[a-z]+(\(.+\))?!:'; then
            ANALYSIS_BUMP="major"
            ANALYSIS_REASON="found ! suffix in commit subject (breaking change)"
          elif printf '%s\n' "$FULL" | grep -q 'BREAKING CHANGE'; then
            ANALYSIS_BUMP="major"
            ANALYSIS_REASON="found 'BREAKING CHANGE' in commit body"
          elif printf '%s\n' "$FULL" | grep -qE '^feat(\(.+\))?:'; then
            ANALYSIS_BUMP="minor"
            ANALYSIS_REASON="found feat: prefix"
          fi
          echo "Analysis suggests: $ANALYSIS_BUMP ($ANALYSIS_REASON)"

          # --- Resolve operator choice ---
          if [ "$CHOICE" = "auto" ]; then
            CHOSEN="$ANALYSIS_BUMP"
            CHOICE_NOTE="resolved via auto -> **$CHOSEN**"
            OVERRIDE_WARN=""
          else
            CHOSEN="$CHOICE"
            if [ "$CHOSEN" = "$ANALYSIS_BUMP" ]; then
              CHOICE_NOTE="explicit: **$CHOSEN** (matches analysis)"
              OVERRIDE_WARN=""
            else
              CHOICE_NOTE="explicit: **$CHOSEN** (overrides analysis suggestion of $ANALYSIS_BUMP)"
              OVERRIDE_WARN="> **Operator override:** chose \`$CHOSEN\` but analysis suggested \`$ANALYSIS_BUMP\` ($ANALYSIS_REASON). Verify this is intentional."
            fi
          fi

          # --- Compute next version ---
          VERSION="${LATEST#"${PREFIX}"}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          case "$CHOSEN" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
            *)
              echo "::error::Unknown bump level: $CHOSEN"
              exit 1
              ;;
          esac

          NEXT_TAG="${PREFIX}${MAJOR}.${MINOR}.${PATCH}"
          echo "Next tag: $NEXT_TAG"
          echo "next_tag=$NEXT_TAG" >> "$GITHUB_OUTPUT"

          # --- Write step summary ---
          {
            echo "### Release $NEXT_TAG ($CHOSEN bump)"
            echo ""
            echo "**Source:** \`$LATEST\` -> \`$NEXT_TAG\`"
            echo "**Input:** \`$CHOICE\` -> $CHOICE_NOTE"
            echo "**Analysis would have picked:** \`$ANALYSIS_BUMP\` - $ANALYSIS_REASON"
            if [ -n "$OVERRIDE_WARN" ]; then
              echo ""
              echo "$OVERRIDE_WARN"
            fi
            echo ""
            echo "**Commits since $LATEST** ($COMMIT_COUNT):"
            echo ""
            git log --format='- %s (%h)' "$RANGE"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Bump version files
        env:
          NEXT_TAG: ${{ steps.compute.outputs.next_tag }}
          TAG_PREFIX: ${{ inputs.tag-prefix }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PREFIX="${TAG_PREFIX:-v}"
          VERSION="${NEXT_TAG#"${PREFIX}"}"

          # --- BEGIN inline:scripts/bump-version-files.sh ---
          bump_version_files() (
          # bump-version-files.sh — apply version bumps from .version-bump.json
          #
          # Reads .version-bump.json and writes the supplied version into each
          # entry's target. Supports two per-entry forms (mutually exclusive):
          #
          #   { "path": "X.json", "field": "version" }                 — legacy
          #   { "path": "X.json", "path_expr": ".pkg[0].version" }     — new
          #
          # Usage:
          #   ./scripts/bump-version-files.sh <config-path> <version>
          #   VERSION=1.2.3 ./scripts/bump-version-files.sh .version-bump.json
          #
          # Exit codes:
          #   0 — at least one entry was modified (caller should commit)
          #   1 — config error: malformed JSON, missing files array, schema
          #       violation. Caller MUST fail the workflow.
          #   2 — config valid but nothing modified: no config file, or all
          #       entries already up to date, or all entries skipped. Caller
          #       should NOT commit, but workflow continues.

          set -euo pipefail

          # Strict allowlist: identifiers, integer indices, bracket-quoted string keys
          # (npm/composer style: kebab-case, @scope/pkg, dotted paths), and the []
          # iterator (applies-to-every). The jq [*] form is NOT valid jq grammar and
          # stays rejected.
          PATH_EXPR_RE='^\.[A-Za-z_][A-Za-z0-9_]*(\.[A-Za-z_][A-Za-z0-9_]*|\[[0-9]+\]|\["[A-Za-z0-9._@/-]+"\]|\[\])*$'

          validate_path_expr() {
            local expr="$1"
            printf '%s' "$expr" | grep -qE "$PATH_EXPR_RE"
          }

          display_path() {
            local field="$1" path_expr="$2"
            if [ -n "$path_expr" ]; then
              printf '%s' "$path_expr"
            else
              printf '.%s' "$field"
            fi
          }

          read_current() {
            local file="$1" field="$2" path_expr="$3"
            if [ -n "$path_expr" ]; then
              jq -r "$path_expr" "$file"
            else
              jq -r --arg f "$field" '.[$f]' "$file"
            fi
          }

          write_value() {
            local file="$1" field="$2" path_expr="$3" version="$4" tmpfile
            tmpfile=$(mktemp)
            if [ -n "$path_expr" ]; then
              jq --indent 2 --arg v "$version" "$path_expr = \$v" "$file" > "$tmpfile"
            else
              jq --indent 2 --arg f "$field" --arg v "$version" '.[$f] = $v' "$file" > "$tmpfile"
            fi
            mv "$tmpfile" "$file"
          }

          # bump_entry — process one .files[] entry
          # Returns 0 if file was modified, 1 if skipped (any reason).
          bump_entry() {
            local file_path="$1" field="$2" path_expr="$3" version="$4"
            local disp; disp=$(display_path "$field" "$path_expr")

            if [ -n "$path_expr" ] && ! validate_path_expr "$path_expr"; then
              printf '::error file=.version-bump.json::Entry for %q has invalid path_expr %q\n' \
                "$file_path" "$path_expr" >&2
              printf '| `%s` | `%s` | - | skipped (invalid path_expr) |\n' "$file_path" "$disp"
              return 1
            fi

            case "$file_path" in
              /*|*..*)
                printf '::warning::%s contains path traversal or is absolute\n' "$file_path" >&2
                printf '| `%s` | `%s` | - | skipped (unsafe path) |\n' "$file_path" "$disp"
                return 1 ;;
            esac
            if [ ! -f "$file_path" ]; then
              printf '::warning::%s not found\n' "$file_path" >&2
              printf '| `%s` | `%s` | - | skipped (file not found) |\n' "$file_path" "$disp"
              return 1
            fi
            case "$file_path" in
              *.json) ;;
              *)
                printf '::warning::%s is not a JSON file\n' "$file_path" >&2
                printf '| `%s` | `%s` | - | skipped (not JSON) |\n' "$file_path" "$disp"
                return 1 ;;
            esac
            if ! jq -e . "$file_path" >/dev/null 2>&1; then
              printf '::warning::%s is not valid JSON\n' "$file_path" >&2
              printf '| `%s` | `%s` | - | skipped (invalid JSON) |\n' "$file_path" "$disp"
              return 1
            fi

            local current; current=$(read_current "$file_path" "$field" "$path_expr")
            if [ "$current" = "$version" ]; then
              printf '| `%s` | `%s` | `%s` | already up to date |\n' "$file_path" "$disp" "$current"
              return 1
            fi

            write_value "$file_path" "$field" "$path_expr" "$version"
            printf '%s\n' "$file_path" >> /tmp/bump.modified
            printf '| `%s` | `%s` | `%s` -> `%s` | updated |\n' \
              "$file_path" "$disp" "$current" "$version"
            return 0
          }

          # --- Main procedural body ---

          config="${1:-.version-bump.json}"
          version="${2:-${VERSION:-}}"
          : "${version:?usage: $0 <config> <version> | VERSION=X $0 [config]}"

          # Manifest of unique modified paths (consumed by tag-release.yml's
          # Git Data API path to build POST /git/trees). Truncate-or-create at
          # start so the file is always a fresh, well-defined snapshot of THIS
          # invocation's modifications. De-dup happens at end of apply pass.
          : > /tmp/bump.modified

          if [ ! -f "$config" ]; then
            echo "No $config found, skipping version file bump"
            exit 2
          fi

          if ! jq -e '.files | type == "array" and length > 0' "$config" >/dev/null 2>&1; then
            echo "::error::$config is missing or has an invalid 'files' array" >&2
            exit 1
          fi

          # Schema validation pass — hard fail before touching any file
          while IFS= read -r row; do
            file_path=$(jq -r '.path // ""' <<<"$row")
            field=$(jq -r '.field // ""' <<<"$row")
            path_expr=$(jq -r '.path_expr // ""' <<<"$row")

            if [ -z "$file_path" ]; then
              echo "::error::$config has an entry missing 'path'" >&2
              exit 1
            fi
            if [ -n "$field" ] && [ -n "$path_expr" ]; then
              echo "::error::$config entry for '$file_path' has both 'field' and 'path_expr' (mutually exclusive)" >&2
              exit 1
            fi
            if [ -z "$field" ] && [ -z "$path_expr" ]; then
              echo "::error::$config entry for '$file_path' has neither 'field' nor 'path_expr'" >&2
              exit 1
            fi
          done < <(jq -c '.files[]' "$config")

          # Apply pass — per-entry, accumulates summary
          changed=0
          while IFS= read -r row; do
            file_path=$(jq -r '.path // ""' <<<"$row")
            field=$(jq -r '.field // ""' <<<"$row")
            path_expr=$(jq -r '.path_expr // ""' <<<"$row")
            if bump_entry "$file_path" "$field" "$path_expr" "$version"; then
              changed=1
            fi
          done < <(jq -c '.files[]' "$config")

          # De-dup manifest in place: a single file may appear N times if
          # .version-bump.json has multiple entries against it (see test
          # `multi-entry: two path_expr entries against same file write both`).
          # sort -u keeps the contract that /tmp/bump.modified is a unique set.
          if [ -s /tmp/bump.modified ]; then
            sort -u /tmp/bump.modified -o /tmp/bump.modified
          fi

          if [ "$changed" -eq 1 ]; then
            exit 0
          else
            exit 2
          fi
          )
          # --- END inline:scripts/bump-version-files.sh ---

          set +e
          bump_version_files .version-bump.json "$VERSION" > /tmp/bump.summary
          BUMP_EXIT=$?
          set -e

          case "$BUMP_EXIT" in
            0)
              # --- Git Data API rewrite (spec §3.1) ---
              # BASE_SHA is the workflow's runtime view of the repo HEAD —
              # the SHA actions/checkout checked out. Reading refs/heads/main
              # fresh here would race with concurrent pushes (spec §2).
              REPO="${GITHUB_REPOSITORY}"
              BASE_SHA="${GITHUB_SHA}"

              # Step 4 (spec): read parent tree SHA from BASE_SHA's commit.
              PARENT_TREE_SHA=$(gh api "repos/${REPO}/git/commits/${BASE_SHA}" --jq '.tree.sha')

              # Steps 3+5: create blobs for each modified file, accumulate
              # tree[] entries, then create the tree.
              TREE_ENTRIES='[]'
              while IFS= read -r modified_path; do
                [ -z "$modified_path" ] && continue
                blob_content_b64=$(base64 < "$modified_path" | tr -d '\n')
                blob_sha=$(jq -nc \
                  --arg c "$blob_content_b64" \
                  '{content: $c, encoding: "base64"}' \
                  | gh api -X POST "repos/${REPO}/git/blobs" --input - --jq '.sha')
                TREE_ENTRIES=$(jq --arg p "$modified_path" --arg s "$blob_sha" \
                  '. + [{path: $p, mode: "100644", type: "blob", sha: $s}]' \
                  <<<"$TREE_ENTRIES")
              done < /tmp/bump.modified

              TREE_SHA=$(jq -nc \
                --arg base "$PARENT_TREE_SHA" \
                --argjson entries "$TREE_ENTRIES" \
                '{base_tree: $base, tree: $entries}' \
                | gh api -X POST "repos/${REPO}/git/trees" --input - --jq '.sha')

              # Step 6: create commit. NO author/committer fields — GitHub
              # auto-signs with the bot/web-flow key only when the request is
              # authenticated as the App AND the body has no identity overrides
              # (spec §3.3).
              NEW_COMMIT_SHA=$(jq -nc \
                --arg msg "chore(release): bump version files to $VERSION" \
                --arg tree "$TREE_SHA" \
                --arg parent "$BASE_SHA" \
                '{message: $msg, tree: $tree, parents: [$parent]}' \
                | gh api -X POST "repos/${REPO}/git/commits" --input - --jq '.sha')

              # Step 7: fast-forward main to the new commit. force=false (default).
              # 422 = non-fast-forward = main moved past BASE_SHA after checkout
              # → fail the run loudly (spec §3.1 step 7, race-detection backstop).
              gh api -X PATCH "repos/${REPO}/git/refs/heads/main" \
                -f sha="$NEW_COMMIT_SHA" \
                -F force=false

              # Acceptance criterion #2 (spec §6): bump commit MUST verify.
              VERIFIED=$(gh api "repos/${REPO}/git/commits/${NEW_COMMIT_SHA}" \
                --jq '.commit.verification.verified')
              REASON=$(gh api "repos/${REPO}/git/commits/${NEW_COMMIT_SHA}" \
                --jq '.commit.verification.reason')
              if [ "$VERIFIED" != "true" ]; then
                echo "::error::Bump commit ${NEW_COMMIT_SHA} did not auto-sign (verified=${VERIFIED} reason=${REASON})"
                echo "::error::This means the API rewrite is not satisfying the required_signatures rule — investigate before proceeding."
                exit 1
              fi

              # Export TAG_TARGET_SHA for the Create-and-push-tag step.
              echo "TAG_TARGET_SHA=${NEW_COMMIT_SHA}" >> "$GITHUB_ENV"
              RESULT="Committed and pushed version file updates via Git Data API (sha: ${NEW_COMMIT_SHA}, verified: true, reason: ${REASON})"
              ;;
            1)
              echo "::error::Bump version files step failed due to .version-bump.json error"
              exit 1
              ;;
            2)
              # No bump created — set TAG_TARGET_SHA from main HEAD via API
              # (spec §3.2 conditional). Covers fresh-no-bump-needed AND
              # rerun-after-partial-failure. NEVER read local checkout state.
              REPO="${GITHUB_REPOSITORY}"
              MAIN_SHA=$(gh api "repos/${REPO}/git/ref/heads/main" --jq '.object.sha')
              echo "TAG_TARGET_SHA=${MAIN_SHA}" >> "$GITHUB_ENV"
              RESULT="No changes — config absent, all up to date, or all entries skipped (tag will point at current main: ${MAIN_SHA})"
              ;;
            *)
              echo "::error::bump-version-files.sh exited with unexpected code $BUMP_EXIT"
              exit 1
              ;;
          esac

          {
            echo "### Version file bump"
            echo ""
            echo "**Target version:** \`$VERSION\`"
            echo ""
            echo "| File | Path | Version | Status |"
            echo "|------|------|---------|--------|"
            cat /tmp/bump.summary
            echo ""
            echo "$RESULT"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create and push tag
        env:
          NEXT_TAG: ${{ steps.compute.outputs.next_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "$NEXT_TAG" -m "Release $NEXT_TAG"
          git push origin "$NEXT_TAG"

          echo "Tagged and pushed $NEXT_TAG - release.yml will pick up from here."
